name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: true

env:
  PROTOBUF_VERSION: "33.5"
  TYPEDUCK_RIME_VERSION: "v1.1.4"

jobs:
  build-release:
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout TypeDuck-Windows
        uses: actions/checkout@v4
        with:
          path: TypeDuck-Windows
          submodules: recursive
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Checkout TypeDuck-Windows-backend
        uses: actions/checkout@v4
        with:
          repository: TypeDuck-HK/TypeDuck-Windows-backend
          path: TypeDuck-Windows-backend
          submodules: recursive
          fetch-depth: 0

      - name: Checkout TypeDuck librime
        uses: actions/checkout@v4
        with:
          repository: TypeDuck-HK/librime
          path: TypeDuck-librime
          submodules: recursive
          fetch-depth: 1
          ref: ${{ env.TYPEDUCK_RIME_VERSION }}

      - name: Download TypeDuck schema build
        run: |
          $schemaDir = Join-Path $env:GITHUB_WORKSPACE "TypeDuck-HK-schema"
          $schemaZip = Join-Path $env:RUNNER_TEMP "TypeDuck-Windows.zip"

          if (Test-Path -LiteralPath $schemaDir) {
            Remove-Item -LiteralPath $schemaDir -Recurse -Force
          }

          Invoke-WebRequest `
            -Uri "https://github.com/TypeDuck-HK/schema/releases/download/latest/TypeDuck-Windows.zip" `
            -OutFile $schemaZip
          Expand-Archive -Path $schemaZip -DestinationPath $schemaDir -Force

      - name: Apply TypeDuck submodule patches
        working-directory: ${{ github.workspace }}/TypeDuck-Windows
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File .\scripts\Apply-TypeDuckSubmodulePatches.ps1 -RepoRoot .

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: TypeDuck-Windows-backend/go.mod
          cache-dependency-path: TypeDuck-Windows-backend/go.sum

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Download protoc
        run: |
          $protocRoot = Join-Path $env:RUNNER_TEMP "protoc-$env:PROTOBUF_VERSION-win64"
          $zipPath = Join-Path $env:RUNNER_TEMP "protoc-$env:PROTOBUF_VERSION-win64.zip"

          if (Test-Path -LiteralPath $protocRoot) {
            Remove-Item -LiteralPath $protocRoot -Recurse -Force
          }

          Invoke-WebRequest `
            -Uri "https://github.com/protocolbuffers/protobuf/releases/download/v$env:PROTOBUF_VERSION/protoc-$env:PROTOBUF_VERSION-win64.zip" `
            -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $protocRoot -Force

          "PROTOBUF_ROOT=$protocRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build release installer
        working-directory: ${{ github.workspace }}/TypeDuck-Windows
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File .\scripts\_all_in_package.ps1 `
            -RepoRoot "$env:GITHUB_WORKSPACE\TypeDuck-Windows" `
            -MoqiImeRoot "$env:GITHUB_WORKSPACE\TypeDuck-Windows-backend" `
            -RimeDataSource "$env:GITHUB_WORKSPACE\TypeDuck-HK-schema" `
            -Arm64RimeSourceRoot "$env:GITHUB_WORKSPACE\TypeDuck-librime" `
            -ProtobufRoot "$env:PROTOBUF_ROOT"

      - name: Verify staged binary architectures
        working-directory: ${{ github.workspace }}/TypeDuck-Windows
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File .\scripts\Test-TypeDuckNativeArm64Artifacts.ps1 `
            -RepoRoot . `
            -StageDir .\installer\stage

      - name: Prepare installer asset name
        working-directory: ${{ github.workspace }}/TypeDuck-Windows
        run: |
          $assetName = "typeduck-windows-ime-x64-arm64-setup-${{ github.event.release.tag_name || github.sha }}.exe"
          $sourceAsset = Join-Path $PWD "installer\dist\typeduck-windows-ime-setup.exe"
          $assetPath = Join-Path $PWD ("installer\dist\" + $assetName)
          if (-not (Test-Path -LiteralPath $sourceAsset -PathType Leaf)) {
            throw "Missing installer asset: $sourceAsset"
          }
          Copy-Item -LiteralPath $sourceAsset -Destination $assetPath -Force
          "TYPEDUCK_INSTALLER_ASSET=$assetName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: typeduck-windows-ime-release-x64-arm64-${{ github.event.release.tag_name || github.sha }}
          path: ${{ github.workspace }}/TypeDuck-Windows/installer/dist/${{ env.TYPEDUCK_INSTALLER_ASSET }}
          if-no-files-found: error

      - name: Upload asset to GitHub release
        if: github.event_name == 'release'
        working-directory: ${{ github.workspace }}/TypeDuck-Windows
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          $assetPath = Join-Path $PWD ("installer\dist\" + $env:TYPEDUCK_INSTALLER_ASSET)
          gh release upload $tag $assetPath --clobber

